<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>健康证查询</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #e9e9e9;
            padding: 10px;
        }
        .cert-wrapper {
            max-width: 450px;
            margin: 0 auto 20px auto;
        }
        .cert-module {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.35);
            width: 100%;
            height: 180px;
        }
        .top-card {
            font-size: 11px;
            display: flex;
            flex-direction: column;
            height: 100%;
            margin-top: 5px;
        }
        .top-title {
            text-align: center;
            font-size: 16px;
            color: #333;
            margin-top: 5px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .top-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex: 1;
        }
        .text-container {
            width: 65%;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .info-line {
            margin-bottom: 8px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 1px;
        }
        .label {}
        .colon {}
        .content { font-weight: bold; }
        .gender-separator { margin-left: 10px; }
        .id-group {
            margin-bottom: 8px;
        }
        .id-group .info-line {
            margin-bottom: 0;
            line-height: 1.2;
        }
        .last-line {
            margin-top: auto;
            margin-bottom: 10px;
        }
        .photo {
            width: 70px;
            height: 90px;
            border: 1px solid #ddd;
            margin-left: 10px;
        }
        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .middle-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #333;
            text-align: center;
            width: 100%;
            height: 180px;
            font-weight: bold;
        }
        .middle-line {
            margin: 5px 0;
        }
        .bottom-card {
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            font-size: 11px;
            text-align: center;
            background: #f8f8f8;
            box-shadow: 0 8px 16px rgba(0,0,0,0.35);
        }
        .qrcode-area {
            text-align: center;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .qrcode-img {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px;
        }
        .qrcode-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .qrcode-title {
            color: #333;
            margin-bottom: 0;
            font-size: 13px;
            font-weight: bold;
        }
        .notice {
            background-color: #fffbeb;
            border: 1px solid #ffeeba;
            border-radius: 8px;
            padding: 12px;
            font-size: 10px;
        }
        .notice-title {
            color: #856404;
            font-weight: bold;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }
        .exclamation-icon {
            margin-right: 5px;
            font-size: 12px;
            background-color: yellow;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #856404;
        }
        .notice-content {
            color: #856404;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    
    <div class="cert-wrapper" data-title="张三_1234">
        <div class="cert-module top-card">
            <div class="top-title">广东省食品从业人员健康证明</div>
            <div class="top-content">
                <div class="text-container">
                    <div class="info-line">
                        <span class="label">姓 名</span>
                        <span class="colon">∶</span>
                        <span class="content">张三</span>
                        <span class="gender-separator"></span>
                        <span class="label">性 别</span>
                        <span class="colon">∶</span>
                        <span class="content">男</span>
                    </div>
                    <div class="id-group">
                        <div class="info-line">
                            <span class="label">身份证号码</span>
                            <span class="colon">∶</span>
                            <span class="content">411521200506303037</span>
                        </div>
                        <div class="info-line">(或其它有效证明)</div>
                    </div>
                    <div class="info-line">
                        <span class="label">体检单位</span>
                        <span class="colon">∶</span>
                        <span class="content">广州东仁医院</span>
                    </div>
                    <div class="info-line last-line">
                        <span class="label">体检日期</span>
                        <span class="colon">∶</span>
                        <span class="content">2026-07-18</span>
                    </div>
                </div>
                <div class="photo">
                    <img src="./one.jpg" alt="持证人照片">
                </div>
            </div>
        </div>
        <div class="cert-module middle-card">
            <div class="middle-line">广东省食品从业人员</div>
            <div class="middle-line">健康证明</div>
        </div>
        <div class="bottom-card">
            <div class="qrcode-area">
                <div class="qrcode-img">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAZoAAAGaAQAAAAAefbjOAAAC+0lEQVR4nO2cX26jMBCHv1mQ8uhIPUCPAjer9kh7AzhKb4AfIxnNPoxtaLrSqkoFKQxPuPhTbTGZPz9PIsqXr/HX1xlwyCGHHHLIIYeOCUm+WiC25VkUEbnWOxGRfpflObQ91Kmq6gSMrwlgFumD1rSzUVWtw5+xJ4cegmJ2ANIzi/TxohBF6CawB+ZBdlqeQ5tB7f0fuj8tCgklNkmI12/6Tw79DOiTRYxXYOxtIDq+pk9Tnn1PDj0CldcdFIhAN8wt0CSIL0kIecJayXryPTn0DdAoS11xUXmbcvZA935RYLZSY6/lObS1j7iTspUIEG6i47VB7yc8+Z4cegTCqspuAqBRHYKq6rTcgZWltQTV4cn35NAjEFovCAkIasZQhsksQgcaNd3CLeLIULaIISR756qayqOganYAjbkR9xHHh2rUaBSCKp0WzzAAeWhm4RZxBoi1Og1YCqFTk23DwoQFkRJe3CKODJWP/eouG8Mqqewm0CFUA3nyPTn0CFQzywRdqTCs9KinX9lKJo8aZ4DWmaVlFMtwAitBa3rpFnF8qOQRVYWoLuODMpHLUo8ax4dW2cPiD5bQYbbhesSJoBo1tFQYExRdqlakE3gecRJopWLn9LLUnOUuyxPLZLeIs0Clc+qi+ltadIgXZbw2Ra0I6R/QdstzaBtopVnmBHK5QmJddXgecQporWKbWdQi0/IIXI84KTSLDuEmEG4ifWyRnqxHWKfE7+uey3NoK6jqUml1pJHr0LA0TkCe4j7iHFBWJUNC5PUmdO8twJzb6DpVSzml32V5Dm0IWVddaaBskhIvOUxAo2K92PElAbPo1stzaC+onmqZjxjlovn7frHFCs9VHfoz9uTQQ1CsX+q0U61Z5K02y4wiYjGl32l5Du0Hde+1zIgiOjBLkbJn784/AbTuxc6tdan0ySxS9lSbq7zWODq07opYvXPKMUcWLtX7I84CfeyzrD5CFwG7NNnVphq3iENDov+fc3/5L5M55JBDDjnkkEMAfwG2D8e7WlbcmgAAAABJRU5ErkJggg==" alt="防伪二维码">
                </div>
                <div class="qrcode-title">此健康信息已上报平台</div>
            </div>
        </div>
    </div>
    
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                const wrappers = document.querySelectorAll('.cert-wrapper');
                let found = false;
                wrappers.forEach(w => {
                    const title = w.getAttribute('data-title');
                    if (title === id) {
                        w.style.display = 'block';
                        found = true;
                    } else {
                        w.style.display = 'none';
                    }
                });
                if (!found) {
                    wrappers.forEach(w => w.style.display = 'block');
                }
            }
        })();
    </script>
</body>
</html>
