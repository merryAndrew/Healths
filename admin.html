<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>健康证后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #e0d6c7;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px 20px 28px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .form-title { text-align: center; font-size: 20px; font-weight: 600; color: #2d2d2d; margin-bottom: 22px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #444; margin-bottom: 5px; }
        .form-group label .required { color: #e74c3c; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 14px; font-size: 15px;
            border: 1.5px solid #d5cdc0; border-radius: 10px;
            background: #faf8f5; outline: none; font-family: inherit; color: #222;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #a67c52; box-shadow: 0 0 0 3px rgba(166,124,82,0.2); background: #fff;
        }
        .form-group input[type="file"] { padding: 10px 0; border: none; background: transparent; }
        .btn-submit {
            width: 100%; padding: 14px 0; font-size: 18px; font-weight: 600;
            color: #fff; background: linear-gradient(135deg, #8b6b4a, #a67c52);
            border: none; border-radius: 12px; cursor: pointer; letter-spacing: 4px;
            margin-top: 8px; box-shadow: 0 4px 12px rgba(166,124,82,0.35);
        }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.6; transform: none; }
        .status-msg {
            margin-top: 14px; padding: 12px; border-radius: 8px;
            text-align: center; font-size: 14px; display: none;
        }
        .status-msg.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-msg.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-msg.loading { display: block; background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .hint { font-size: 12px; color: #888; margin-top: 4px; }
        .token-hint { background: #f0f4ff; padding: 10px; border-radius: 8px; font-size: 13px; color: #333; margin-bottom: 16px; border: 1px solid #d0d8e8; }
        .token-hint code { background: #e0e6f0; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-title">📋 新增健康证</div>

    <div class="token-hint">
        ⚠️ 首次使用需设置Token：<br>
        1. 去 <b>GitHub Settings → Developer settings → Personal access tokens</b><br>
        2. 生成新Token，勾选 <code>repo</code> 权限<br>
        3. 把Token粘贴到下面
    </div>

    <div class="form-group">
        <label>GitHub Token <span class="required">*</span></label>
        <input type="password" id="tokenInput" placeholder="粘贴你的GitHub Token">
    </div>

    <div class="form-group">
        <label>标题 <span class="required">*</span></label>
        <input type="text" id="titleInput" placeholder="例如 张三_1234">
        <div class="hint">格式：姓名_身份证后四位</div>
    </div>

    <div class="form-group">
        <label>性别 <span class="required">*</span></label>
        <select id="genderSelect">
            <option value="男">男</option>
            <option value="女">女</option>
        </select>
    </div>

    <div class="form-group">
        <label>身份证号码 <span class="required">*</span></label>
        <input type="text" id="idInput" placeholder="请输入18位身份证号">
    </div>

    <div class="form-group">
        <label>体检日期 <span class="required">*</span></label>
        <input type="text" id="dateInput" placeholder="2026年7月15日 (有效期一年)" value="2026年7月15日 (有效期一年)">
    </div>

    <div class="form-group">
        <label>证件照 <span class="required">*</span></label>
        <input type="file" id="photoInput" accept="image/*">
        <div class="hint">点击选择或拍照上传</div>
    </div>

    <button class="btn-submit" id="submitBtn">提交</button>
    <div id="statusMsg" class="status-msg"></div>
</div>

<script>
    (function() {
        const tokenInput = document.getElementById('tokenInput');
        const titleInput = document.getElementById('titleInput');
        const genderSelect = document.getElementById('genderSelect');
        const idInput = document.getElementById('idInput');
        const dateInput = document.getElementById('dateInput');
        const photoInput = document.getElementById('photoInput');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');

        // 从本地存储读取Token
        const savedToken = localStorage.getItem('github_token');
        if (savedToken) tokenInput.value = savedToken;

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = 'status-msg ' + type;
        }

        // 图片转Base64
        function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]); // 去掉data:image/xxx;base64,
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 上传到GitHub Issues（通过评论方式附加图片）
        async function uploadImageToIssue(token, repo, issueNumber, base64Image, fileName) {
            // 先上传图片到仓库（用contents API）
            const path = `images/${fileName}`;
            const url = `https://api.github.com/repos/${repo}/contents/${path}`;
            const res = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: `上传图片 ${fileName}`,
                    content: base64Image,
                    branch: 'main'
                })
            });
            if (!res.ok) throw new Error('图片上传失败');
            const data = await res.json();
            return data.content.download_url;
        }

        // 创建Issue（含图片链接）
        async function createIssue(token, repo, title, body) {
            const url = `https://api.github.com/repos/${repo}/issues`;
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ title, body })
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || '创建Issue失败');
            }
            return res.json();
        }

        submitBtn.addEventListener('click', async function() {
            const token = tokenInput.value.trim();
            const title = titleInput.value.trim();
            const gender = genderSelect.value;
            const idNumber = idInput.value.trim();
            const examDate = dateInput.value.trim();
            const photoFile = photoInput.files[0];

            if (!token) { showStatus('请粘贴GitHub Token', 'error'); return; }
            if (!title) { showStatus('请填写标题（姓名_身份证后四位）', 'error'); return; }
            if (!idNumber) { showStatus('请填写身份证号码', 'error'); return; }
            if (!examDate) { showStatus('请填写体检日期', 'error'); return; }
            if (!photoFile) { showStatus('请上传证件照', 'error'); return; }
            if (!title.includes('_')) {
                showStatus('标题格式错误，请用 姓名_身份证后四位 格式', 'error');
                return;
            }

            // 保存Token
            localStorage.setItem('github_token', token);

            submitBtn.disabled = true;
            showStatus('⏳ 上传中...', 'loading');

            try {
                // 1. 图片转Base64
                const base64 = await imageToBase64(photoFile);
                const fileName = `${title}_${Date.now()}.jpg`;

                // 2. 上传图片到仓库
                const repo = 'merryAndrew/Healths';
                const imageUrl = await uploadImageToIssue(token, repo, 0, base64, fileName);

                // 3. 创建Issue
                const body = `性别：${gender}\n身份证：${idNumber}\n体检日期：${examDate}\n\n![证件照](${imageUrl})`;
                const issue = await createIssue(token, repo, title, body);

                showStatus(`✅ 创建成功！Issue #${issue.number}`, 'success');
                titleInput.value = '';
                idInput.value = '';
                dateInput.value = '';
                photoInput.value = '';

            } catch (err) {
                showStatus('❌ ' + err.message, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });
    })();
</script>
</body>
</html>
